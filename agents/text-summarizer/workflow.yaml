apiVersion: workflow.axiomstudio.ai/v1
kind: Workflow
metadata:
  name: text-summarizer
spec:
  entryPoint: summarize
  nodes:
    - id: input
      type: input
      config:
        schema: ${inputSchema}

    - id: validate
      type: validation
      dependsOn: [input]
      config:
        rules:
          - field: text
            condition: minLength
            value: 50
            message: "Text must be at least 50 characters"

    - id: summarize
      type: llm-inference
      dependsOn: [validate]
      config:
        model: ${config.model}
        temperature: 0.3
        prompt: |
          Summarize the following text in a ${config.style} manner.
          Maximum ${config.maxLength} words.

          Text: ${input.text}

          Return a JSON object with:
          - summary: the summary text
          - keyPoints: array of 3-5 key points
          - sentiment: overall sentiment (positive/negative/neutral/mixed)

    - id: format
      type: transform
      dependsOn: [summarize]
      config:
        mapping:
          summary: ${summarize.summary}
          wordCount: ${summarize.summary.split(' ').length}
          keyPoints: ${summarize.keyPoints}
          sentiment: ${summarize.sentiment}

    - id: output
      type: output
      dependsOn: [format]
      config:
        schema: ${outputSchema}

  outputs:
    summary: ${format.summary}
    wordCount: ${format.wordCount}
    keyPoints: ${format.keyPoints}
    sentiment: ${format.sentiment}