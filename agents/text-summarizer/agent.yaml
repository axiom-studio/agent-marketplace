apiVersion: axiom.studio/v1
kind: AgentLibraryVersion
metadata:
  name: Text Summarizer
  description: Summarize long text into concise summaries using AI
  version: 1.0.0
  category: ml-inference
  tags:
    - nlp
    - summarization
    - ai
  author: Axiom Studio
  authorEmail: support@axiomstudio.ai
  license: Apache-2.0

spec:
  nodes:
    - id: input
      name: Input
      description: Receive text input
      type: input
      position:
        x: 100
        y: 200
      config:
        fields:
          - name: text
            type: string
            required: true
            description: The text to summarize
          - name: maxLength
            type: integer
            default: 200
            description: Maximum summary length in words
          - name: style
            type: string
            default: concise
            enum:
              - concise
              - detailed
              - bullet-points

    - id: llm
      name: LLM Summarizer
      description: Generate summary using LLM
      type: ai
      position:
        x: 400
        y: 200
      config:
        model: gpt-4
        temperature: 0.3
        prompt: |
          Summarize the following text in a {{style}} manner.
          Maximum {{maxLength}} words.

          Text: {{input.text}}

          Return a JSON object with:
          - summary: the summary text
          - keyPoints: array of 3-5 key points
          - sentiment: overall sentiment (positive/negative/neutral/mixed)

    - id: output
      name: Output
      description: Return the summary
      type: output
      position:
        x: 700
        y: 200
      config:
        summary: "{{llm.summary}}"
        wordCount: "{{llm.summary.split(' ').length}}"
        keyPoints: "{{llm.keyPoints}}"
        sentiment: "{{llm.sentiment}}"

  connections:
    - id: conn-1
      sourceNodeId: input
      targetNodeId: llm
    - id: conn-2
      sourceNodeId: llm
      targetNodeId: output

  inputSchema:
    text:
      type: string
      required: true
      description: The text to summarize
      minLength: 50
      maxLength: 50000
    maxLength:
      type: integer
      description: Maximum summary length in words
      default: 200
    style:
      type: string
      description: Summary style
      default: concise
      enum:
        - concise
        - detailed
        - bullet-points

  outputSchema:
    summary:
      type: string
      description: The generated summary
    wordCount:
      type: integer
      description: Number of words in summary
    keyPoints:
      type: array
      description: Key points extracted
      items:
        type: string
    sentiment:
      type: string
      description: Overall sentiment
      enum:
        - positive
        - negative
        - neutral
        - mixed

  dependencies:
    skills:
      - id: core
    nodeTypes:
      - ai
    permissions:
      - network:outbound