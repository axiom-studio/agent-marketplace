apiVersion: axiom.studio/v1
kind: AgentLibraryVersion
metadata:
  name: Email Sender
  description: Send emails with templates and attachments
  version: 1.0.0
  category: notifications
  tags:
    - email
    - notifications
    - smtp
  author: Axiom Studio
  authorEmail: support@axiomstudio.ai
  license: Apache-2.0

spec:
  nodes:
    - id: input
      name: Input
      description: Receive email parameters
      type: input
      position:
        x: 100
        y: 200
      config:
        fields:
          - name: to
            type: array
            required: true
            description: Recipient email addresses
          - name: subject
            type: string
            required: true
            description: Email subject
          - name: body
            type: string
            required: true
            description: Email body
          - name: isHtml
            type: boolean
            default: false
            description: Whether body is HTML

    - id: smtp
      name: SMTP Sender
      description: Send email via SMTP
      type: http-request
      position:
        x: 400
        y: 200
      config:
        method: POST
        url: "${env.SMTP_HOST}:${env.SMTP_PORT}/send"
        auth:
          type: basic
          username: "${env.SMTP_USER}"
          password: "${env.SMTP_PASSWORD}"
        body:
          to: "{{input.to}}"
          subject: "{{input.subject}}"
          body: "{{input.body}}"
          isHtml: "{{input.isHtml}}"

    - id: output
      name: Output
      description: Return send result
      type: output
      position:
        x: 700
        y: 200
      config:
        success: "{{smtp.success}}"
        messageId: "{{smtp.messageId}}"
        sentAt: "{{smtp.timestamp}}"

  connections:
    - id: conn-1
      sourceNodeId: input
      targetNodeId: smtp
    - id: conn-2
      sourceNodeId: smtp
      targetNodeId: output

  inputSchema:
    to:
      type: array
      required: true
      description: Recipient email addresses
      items:
        type: string
        format: email
    subject:
      type: string
      required: true
      description: Email subject
      minLength: 1
      maxLength: 200
    body:
      type: string
      required: true
      description: Email body
    isHtml:
      type: boolean
      default: false
      description: Whether body is HTML

  outputSchema:
    success:
      type: boolean
      description: Whether email was sent successfully
    messageId:
      type: string
      description: Unique message identifier
    sentAt:
      type: string
      format: date-time
      description: Timestamp when email was sent

  dependencies:
    skills:
      - id: core
    nodeTypes:
      - http-request
    permissions:
      - network:outbound