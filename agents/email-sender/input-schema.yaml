type: object
required:
  - to
  - subject
  - body
properties:
  to:
    type: array
    description: Recipient email addresses
    items:
      type: string
      format: email
    minItems: 1

  cc:
    type: array
    description: CC recipients
    items:
      type: string
      format: email

  bcc:
    type: array
    description: BCC recipients
    items:
      type: string
      format: email

  subject:
    type: string
    description: Email subject
    minLength: 1
    maxLength: 200

  body:
    type: string
    description: Email body (HTML or plain text)
    minLength: 1

  isHtml:
    type: boolean
    description: Whether body is HTML
    default: false

  attachments:
    type: array
    description: File attachments
    items:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
          description: Base64 encoded content
        mimeType:
          type: string