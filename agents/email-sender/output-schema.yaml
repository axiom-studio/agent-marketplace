type: object
required:
  - success
  - messageId
properties:
  success:
    type: boolean
    description: Whether the email was sent successfully

  messageId:
    type: string
    description: Unique message identifier

  sentAt:
    type: string
    format: date-time
    description: Timestamp when email was sent

  recipients:
    type: integer
    description: Total number of recipients