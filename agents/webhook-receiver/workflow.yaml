apiVersion: workflow.axiomstudio.ai/v1
kind: Workflow
metadata:
  name: webhook-receiver
spec:
  entryPoint: process
  trigger:
    type: webhook
    config:
      path: /webhook/{source}
      methods: [POST]

  nodes:
    - id: input
      type: input
      config:
        schema: ${inputSchema}

    - id: verify
      type: validation
      dependsOn: [input]
      config:
        verifySignature: ${config.verifySignature}
        secret: ${env.WEBHOOK_SECRET}
        signatureHeader: X-Hub-Signature-256

    - id: route
      type: switch
      dependsOn: [verify]
      config:
        field: ${input.source}
        cases:
          github:
            workflow: ./github-handler.yaml
          stripe:
            workflow: ./stripe-handler.yaml
          slack:
            workflow: ./slack-handler.yaml
          default:
            workflow: ./default-handler.yaml

    - id: output
      type: output
      dependsOn: [route]
      config:
        schema: ${outputSchema}

  outputs:
    received: true
    eventId: ${input.timestamp}-${input.event}
    processed: ${route.success}
    actions: ${route.actions}
    response: ${route.response}