type: object
required:
  - event
properties:
  event:
    type: string
    description: Event type from the webhook source

  payload:
    type: object
    description: Webhook payload data

  headers:
    type: object
    description: HTTP headers from the webhook request
    additionalProperties:
      type: string

  source:
    type: string
    description: Webhook source identifier
    enum:
      - github
      - stripe
      - slack
      - custom

  timestamp:
    type: string
    format: date-time
    description: When the webhook was received