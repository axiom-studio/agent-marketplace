apiVersion: axiom.studio/v1
kind: AgentLibraryVersion
metadata:
  name: Webhook Receiver
  description: Receive and process webhook events from external services
  version: 1.0.0
  category: integration
  tags:
    - webhook
    - integration
    - events
  author: Axiom Studio
  authorEmail: support@axiomstudio.ai
  license: Apache-2.0

spec:
  nodes:
    - id: webhook
      name: Webhook Trigger
      description: Receive webhook request
      type: webhook
      position:
        x: 100
        y: 200
      config:
        path: /webhook/{source}
        methods:
          - POST
        verifySignature: true
        secret: "${env.WEBHOOK_SECRET}"

    - id: validate
      name: Validate
      description: Validate webhook signature
      type: if
      position:
        x: 350
        y: 200
      config:
        condition: "{{webhook.headers.X-Hub-Signature-256 == validSignature}}"

    - id: process
      name: Process Event
      description: Process webhook payload
      type: switch
      position:
        x: 600
        y: 200
      config:
        field: "{{webhook.source}}"
        cases:
          github: github-handler
          stripe: stripe-handler
          default: default-handler

    - id: output
      name: Output
      description: Return response
      type: email
      position:
        x: 850
        y: 200
      config:
        received: true
        eventId: "{{webhook.eventId}}"
        processed: "{{process.success}}"

  connections:
    - id: conn-1
      sourceNodeId: webhook
      targetNodeId: validate
    - id: conn-2
      sourceNodeId: validate
      targetNodeId: process
    - id: conn-3
      sourceNodeId: process
      targetNodeId: output

  inputSchema:
    event:
      type: string
      description: Event type from webhook source
    payload:
      type: object
      description: Webhook payload data
    headers:
      type: object
      description: HTTP headers from webhook
    source:
      type: string
      description: Webhook source identifier
      enum:
        - github
        - stripe
        - slack
        - custom

  outputSchema:
    received:
      type: boolean
      description: Whether webhook was received
    eventId:
      type: string
      description: Unique event identifier
    processed:
      type: boolean
      description: Whether webhook was processed

  dependencies:
    skills:
      - id: core
    nodeTypes:
      - webhook
      - if
      - switch
      - email
    permissions:
      - network:inbound