type: object
required:
  - received
  - eventId
properties:
  received:
    type: boolean
    description: Whether the webhook was received successfully

  eventId:
    type: string
    description: Unique event identifier

  processed:
    type: boolean
    description: Whether the webhook was processed

  actions:
    type: array
    description: Actions taken
    items:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        message:
          type: string

  response:
    type: object
    description: Response to send back
    properties:
      statusCode:
        type: integer
      body:
        type: object