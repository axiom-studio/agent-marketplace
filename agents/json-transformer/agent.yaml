apiVersion: axiom.studio/v1
kind: AgentLibraryVersion
metadata:
  name: JSON Transformer
  description: Transform JSON data using templates and mappings
  version: 1.0.0
  category: data-processing
  tags:
    - json
    - transformation
    - etl
  author: Axiom Studio
  authorEmail: support@axiomstudio.ai
  license: Apache-2.0

spec:
  nodes:
    - id: input
      name: Input
      description: Receive JSON data and mapping
      type: input
      position:
        x: 100
        y: 200
      config:
        fields:
          - name: data
            type: object
            required: true
            description: Input JSON data
          - name: mapping
            type: object
            required: true
            description: Mapping rules

    - id: transform
      name: Transform
      description: Apply transformations
      type: transform
      position:
        x: 400
        y: 200
      config:
        data: "{{input.data}}"
        mapping: "{{input.mapping}}"
        strictMode: false

    - id: output
      name: Output
      description: Return transformed data
      type: output
      position:
        x: 700
        y: 200
      config:
        result: "{{transform.result}}"
        stats: "{{transform.stats}}"

  connections:
    - id: conn-1
      sourceNodeId: input
      targetNodeId: transform
    - id: conn-2
      sourceNodeId: transform
      targetNodeId: output

  inputSchema:
    data:
      type: object
      required: true
      description: Input JSON data to transform
    mapping:
      type: object
      required: true
      description: Mapping rules for transformation

  outputSchema:
    result:
      type: object
      description: Transformed JSON data
    stats:
      type: object
      description: Transformation statistics
      properties:
        fieldsProcessed:
          type: integer
        fieldsTransformed:
          type: integer

  dependencies:
    skills:
      - id: core
    nodeTypes:
      - transform