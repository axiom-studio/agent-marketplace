apiVersion: workflow.axiomstudio.ai/v1
kind: Workflow
metadata:
  name: json-transformer
spec:
  entryPoint: transform
  nodes:
    - id: input
      type: input
      config:
        schema: ${inputSchema}

    - id: transform
      type: data-transform
      dependsOn: [input]
      config:
        data: ${input.data}
        mapping: ${input.mapping}
        strictMode: ${config.strictMode}
        preserveNull: ${config.preserveNull}

    - id: output
      type: output
      dependsOn: [transform]
      config:
        schema: ${outputSchema}

  outputs:
    result: ${transform.result}
    stats: ${transform.stats}