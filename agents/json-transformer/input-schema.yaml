type: object
required:
  - data
  - mapping
properties:
  data:
    type: object
    description: Input JSON data to transform

  mapping:
    type: object
    description: Mapping rules for transformation
    properties:
      fields:
        type: array
        description: Field mappings
        items:
          type: object
          properties:
            from:
              type: string
              description: Source field path (e.g., "user.name")
            to:
              type: string
              description: Target field path
            default:
              description: Default value if source is null
            transform:
              type: string
              description: Transformation function
              enum:
                - uppercase
                - lowercase
                - trim
                - number
                - boolean
                - date

  arrayMode:
    type: string
    description: How to handle arrays
    default: map
    enum:
      - map
      - filter
      - reduce