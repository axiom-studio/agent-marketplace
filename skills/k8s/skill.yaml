apiVersion: axiom.studio/v1
kind: Skill

metadata:
  id: k8s
  name: "Kubernetes Operations"
  description: "Comprehensive Kubernetes cluster management - deploy, scale, monitor, and troubleshoot your K8s resources with powerful node types"
  author: "Axiom Studio"
  authorEmail: "engineering@axiomstudio.ai"
  version: 1.0.0
  license: MIT
  category: infrastructure
  tags:
    - kubernetes
    - k8s
    - infrastructure
    - containers
    - devops
  icon: "https://cdn.axiomstudio.ai/icons/kubernetes.svg"
  color: "#326CE5"

spec:
  executorType: grpc

  nodeTypes:
    - k8s-get
    - k8s-list
    - k8s-logs
    - k8s-events
    - k8s-restart
    - k8s-scale
    - k8s-patch
    - k8s-delete
    - k8s-watch
    - k8s-event

  grpc:
    port: 50053
    binary:
      linux-amd64: skill-k8s-linux-amd64
      linux-arm64: skill-k8s-linux-arm64
      darwin-amd64: skill-k8s-darwin-amd64
      darwin-arm64: skill-k8s-darwin-arm64

  permissions:
    - k8s:read
    - k8s:write